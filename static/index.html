<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Chat</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 480px;
        padding: 16px;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        margin-bottom: 16px;
      }

      h2 {
        margin-bottom: 16px;
        font-size: 1.2rem;
        color: #111;
      }
      h3 {
        margin-bottom: 12px;
        font-size: 1rem;
        color: #333;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.95rem;
        margin-bottom: 10px;
        outline: none;
      }
      input:focus {
        border-color: #4f46e5;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        cursor: pointer;
        margin-bottom: 8px;
      }
      button:hover {
        background: #4338ca;
      }
      button.secondary {
        background: white;
        color: #4f46e5;
        border: 1px solid #4f46e5;
      }
      button.secondary:hover {
        background: #eef2ff;
      }

      #status {
        font-size: 0.85rem;
        color: #666;
        margin-top: 8px;
        text-align: center;
      }

      #rooms-list {
        margin-bottom: 12px;
      }

      .room-btn {
        width: 100%;
        text-align: left;
        padding: 10px 14px;
        background: #f8f8f8;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        margin-bottom: 6px;
        cursor: pointer;
        color: #333;
        font-size: 0.9rem;
      }
      .room-btn:hover {
        background: #eef2ff;
        border-color: #4f46e5;
        color: #4f46e5;
      }

      #messages {
        height: 300px;
        overflow-y: auto;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        background: #fafafa;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .message {
        padding: 8px 12px;
        border-radius: 8px;
        max-width: 85%;
        font-size: 0.9rem;
        line-height: 1.4;
      }
      .message.mine {
        background: #4f46e5;
        color: white;
        align-self: flex-end;
      }
      .message.theirs {
        background: #e5e7eb;
        color: #111;
        align-self: flex-start;
      }
      .message .sender {
        font-size: 0.75rem;
        margin-bottom: 2px;
        opacity: 0.7;
      }

      .send-row {
        display: flex;
        gap: 8px;
      }
      .send-row input {
        margin-bottom: 0;
        flex: 1;
      }
      .send-row button {
        width: auto;
        padding: 10px 20px;
        margin-bottom: 0;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- ── Auth Panel ── -->
      <div class="card" id="auth-panel">
        <h2>💬 Go Chat</h2>
        <input id="username" type="text" placeholder="Username" />
        <input id="password" type="password" placeholder="Password" />
        <button onclick="register()">Register</button>
        <button class="secondary" onclick="login()">Login</button>
        <div id="status"></div>
      </div>

      <!-- ── Rooms Panel ── -->
      <div class="card hidden" id="rooms-panel">
        <h2>Rooms</h2>
        <div id="rooms-list"></div>
        <input id="new-room-name" type="text" placeholder="New room name..." />
        <button onclick="createRoom()">+ Create Room</button>
      </div>

      <!-- ── Chat Panel ── -->
      <div class="card hidden" id="chat-panel">
        <h3 id="room-title">Room</h3>
        <div id="messages"></div>
        <div class="send-row">
          <input
            id="msg-input"
            type="text"
            placeholder="Type a message..."
            onkeydown="if (event.key === 'Enter') sendMessage();"
          />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <script>
      let token = null;
      let socket = null;
      let currentUser = null;
      let currentRoomID = null;

      const $ = (id) => document.getElementById(id);

      function setStatus(msg, color = "#666") {
        $("status").style.color = color;
        $("status").textContent = msg;
      }

      // ── Auth ──────────────────────────────────────────────────────────

      async function register() {
        const username = $("username").value.trim();
        const password = $("password").value.trim();
        if (!username || !password) return setStatus("Fill in both fields");

        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (res.status === 201) {
          setStatus("Registered! Now log in.", "green");
        } else {
          const text = await res.text();
          setStatus(text, "red");
        }
      }

      async function login() {
        const username = $("username").value.trim();
        const password = $("password").value.trim();
        if (!username || !password) return setStatus("Fill in both fields");

        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          const data = await res.json();
          token = data.token;
          currentUser = username;
          setStatus("");
          $("auth-panel").classList.add("hidden");
          $("rooms-panel").classList.remove("hidden");
          loadRooms();
        } else {
          const text = await res.text();
          setStatus(text, "red");
        }
      }

      // ── Rooms ─────────────────────────────────────────────────────────

      async function loadRooms() {
        const res = await fetch("/rooms");
        const rooms = await res.json();
        const list = $("rooms-list");
        list.innerHTML = "";

        if (rooms.length === 0) {
          list.innerHTML =
            '<p style="color:#999;font-size:0.9rem">No rooms yet. Create one below.</p>';
          return;
        }

        rooms.forEach((room) => {
          const btn = document.createElement("button");
          btn.className = "room-btn";
          btn.textContent = "# " + room.name;
          btn.onclick = () => joinRoom(room.id, room.name);
          list.appendChild(btn);
        });
      }

      async function createRoom() {
        const name = $("new-room-name").value.trim();
        if (!name) return;

        const res = await fetch("/rooms", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name }),
        });

        if (res.ok) {
          $("new-room-name").value = "";
          loadRooms();
        } else {
          alert("Could not create room");
        }
      }

      // ── WebSocket ─────────────────────────────────────────────────────

      function joinRoom(roomID, roomName) {
        // Close any existing connection
        if (socket) socket.close();

        currentRoomID = roomID;
        $("room-title").textContent = "# " + roomName;
        $("messages").innerHTML = "";
        $("rooms-panel").classList.add("hidden");
        $("chat-panel").classList.remove("hidden");

        // Connect to WebSocket with token + room_id as query params
        socket = new WebSocket(
          `ws://localhost:8080/ws?token=${token}&room_id=${roomID}`,
        );

        socket.onopen = () => {
          console.log("WebSocket connected");
        };

        socket.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          appendMessage(
            msg.username,
            msg.content,
            msg.username === currentUser,
          );
        };

        socket.onclose = () => {
          console.log("WebSocket disconnected");
        };

        socket.onerror = (err) => {
          console.error("WebSocket error", err);
        };
      }

      function sendMessage() {
        const input = $("msg-input");
        const content = input.value.trim();
        if (!content || !socket) return;

        socket.send(JSON.stringify({ content }));
        input.value = "";
      }

      function appendMessage(username, content, isMine) {
        const box = $("messages");
        const div = document.createElement("div");
        div.className = "message " + (isMine ? "mine" : "theirs");
        div.innerHTML = `<div class="sender">${username}</div><div>${content}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight; // auto-scroll to latest
      }
    </script>
  </body>
</html>
