services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://chatuser:chatpass@db:5432/chatdb?sslmode=disable
      JWT_SECRET: your-production-secret-here
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
